# nginx/nginx.conf
# High-performance Nginx configuration for Perplexity-scale traffic.
# Key optimisations:
#   - Worker processes = CPU count (handles thousands of concurrent connections)
#   - Upstream load balancing across all app replicas
#   - Response caching for static assets and API responses
#   - Gzip at the edge (backup to app-level compression)
#   - Connection keep-alive (reduces TCP handshake overhead)
#   - Security headers (OWASP best practices)

worker_processes auto;                   # Match CPU core count
worker_rlimit_nofile 65535;              # Max open file descriptors per worker

events {
  worker_connections 4096;              # Max concurrent connections per worker
  use epoll;                            # High-performance event model (Linux)
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Connection settings ───────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 1000;
  reset_timedout_connection on;

  # ── Buffer sizes ──────────────────────────────────────────────────────────
  client_body_buffer_size     128k;
  client_max_body_size        10m;
  client_header_buffer_size   1k;
  large_client_header_buffers 4 16k;
  output_buffers              1 32k;
  postpone_output             1460;

  # ── Gzip compression at edge ─────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   4;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_min_length   256;
  gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.ms-fontobject
    application/wasm
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/calendar
    text/css
    text/javascript
    text/markdown
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy
    text/xml;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time ut="$upstream_response_time"';
  access_log /var/log/nginx/access.log main buffer=64k flush=5s;
  error_log  /var/log/nginx/error.log warn;

  # ── Rate limiting zones ───────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_global:20m rate=50r/s;
  limit_req_zone $binary_remote_addr zone=search:10m    rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth:5m       rate=2r/s;

  # ── Upstream – load balance across all app replicas ──────────────────────
  # Docker Compose assigns IPs; use service name "app" which resolves to all replicas.
  upstream app_cluster {
    least_conn;                       # Route to the least-loaded replica
    server app:8080;
    keepalive 32;                     # Maintain 32 persistent connections per worker to backend
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    # TLS (replace with your actual cert paths)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"          always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin"       always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=(self)" always;

    # ── Edge caching for static assets ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
      proxy_pass http://app_cluster;
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # ── Health check (no rate limit, no logging) ───────────────────────────
    location = /health {
      proxy_pass http://app_cluster;
      access_log off;
    }

    location = /ready {
      proxy_pass http://app_cluster;
      access_log off;
    }

    # ── Auth endpoints (strict rate limit) ────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://app_cluster;
      include /etc/nginx/snippets/proxy_headers.conf;
    }

    # ── Search endpoints (search rate limit) ──────────────────────────────
    location ~ ^/api/search {
      limit_req zone=search burst=20 nodelay;
      limit_req_status 429;
      proxy_pass http://app_cluster;
      include /etc/nginx/snippets/proxy_headers.conf;
      proxy_read_timeout 60s;         # AI calls can take up to 30s
    }

    # ── All other API routes ───────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_global burst=100 nodelay;
      limit_req_status 429;
      proxy_pass http://app_cluster;
      include /etc/nginx/snippets/proxy_headers.conf;
    }

    # ── Frontend SPA (React) ───────────────────────────────────────────────
    location / {
      proxy_pass http://app_cluster;
      include /etc/nginx/snippets/proxy_headers.conf;
    }
  }
}
